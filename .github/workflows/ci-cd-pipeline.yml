name: Frontend - CI/CD Pipeline con Telegram

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: PROMOCIÓN A TEST
  # ==========================================
  promote-to-test:
    name: Promover código de Develop a Test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Develop a Test
        run: |
          git checkout test || git checkout -b test
          git merge origin/develop --no-edit
          git push origin test

  # ==========================================
  # JOB 2: PRUEBAS FRONTEND
  # ==========================================
  run-tests:
    name: Compilación y Pruebas (Angular)
    needs: promote-to-test
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.extract-summary.outputs.run }}
      success: ${{ steps.extract-summary.outputs.success }}
      fail: ${{ steps.extract-summary.outputs.fail }}
      bugs: ${{ steps.extract-summary.outputs.bugs }}
      vulns: ${{ steps.extract-summary.outputs.vulns }}
      smells: ${{ steps.extract-summary.outputs.smells }}
      test_details: ${{ steps.extract-summary.outputs.test_details }}
    steps:
      - name: Descargar código a testear
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalar Dependencias y Compilar
        run: |
          mkdir -p evidencias
          npm install
          # Pruebas automatizadas (log a archivo)
          npm run test -- --watch=false > evidencias/frontend_tests.log 2>&1 || true
          npx ng build --configuration production
          
      - name: Debug Output
        run: cat evidencias/frontend_tests.log
          
      - name: SonarCloud Scan & Quality Gate
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=master
            -Dsonar.qualitygate.wait=true
          
      - name: Extraer Métricas y Resumen de Pruebas
        id: extract-summary
        run: |
          # Limpiar TODOS los colores y códigos de control ANSI del log
          perl -pe 's/\x1b\[[0-9;]*[a-zA-Z]//g' evidencias/frontend_tests.log > clean.log
          
          # Extraer pruebas Vitest/Karma
          TEST_LINE=$(grep "Tests " clean.log | tail -n 1) || true
          if [ -z "$TEST_LINE" ] || [[ "$TEST_LINE" != *"passed"* && "$TEST_LINE" != *"failed"* ]]; then
            # Fallback a karma si no es vitest
            TEST_LINE=$(grep -i "Executed" clean.log | tail -n 1) || true
            RUN=$(echo "$TEST_LINE" | grep -oP 'Executed \K\d+' || echo "0")
            FAIL=$(echo "$TEST_LINE" | grep -oP '\K\d+(?= FAILED)' || echo "0")
            SUCCESS=$((RUN - FAIL))
          else
            # Vitest parsing más robusto
            SUCCESS=$(echo "$TEST_LINE" | grep -oP '\d+(?=\s+passed)' | tail -n 1 || echo "0")
            FAIL=$(echo "$TEST_LINE" | grep -oP '\d+(?=\s+failed)' | tail -n 1 || echo "0")
            RUN=$((SUCCESS + FAIL))
          fi
          
          # Extraer detalles específicos
          TEST_DETAILS=$(grep "\.spec\.ts" clean.log | grep -v "Test Files" | awk '{for(i=1;i<=NF;i++) if($i ~ /\.spec\.ts/) print "  👉 "$i}' | head -n 15)
          if [ -z "$TEST_DETAILS" ]; then TEST_DETAILS="  Sin detalles específicos"; fi
          
          # Extraer métricas SonarCloud usando API
          METRICS_JSON=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: "https://sonarcloud.io/api/measures/component?component=ferreteria-kanos_frontend&metricKeys=bugs,vulnerabilities,code_smells,coverage")
          BUGS=$(echo $METRICS_JSON | jq -r '.component.measures[] | select(.metric=="bugs") | .value' 2>/dev/null || echo "N/A")
          VULNS=$(echo $METRICS_JSON | jq -r '.component.measures[] | select(.metric=="vulnerabilities") | .value' 2>/dev/null || echo "N/A")
          SMELLS=$(echo $METRICS_JSON | jq -r '.component.measures[] | select(.metric=="code_smells") | .value' 2>/dev/null || echo "N/A")
          
          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT
          echo "bugs=$BUGS" >> $GITHUB_OUTPUT
          echo "vulns=$VULNS" >> $GITHUB_OUTPUT
          echo "smells=$SMELLS" >> $GITHUB_OUTPUT
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "test_details<<$EOF" >> $GITHUB_OUTPUT
          echo "$TEST_DETAILS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Guardar evidencias
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidencias-frontend
          path: evidencias/

  # ==========================================
  # JOB 3: PROMOCIÓN A MAIN
  # ==========================================
  promote-to-main:
    name: Promover código de Test a Main
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Test a Main
        run: |
          git checkout main
          git merge origin/test --no-edit
          git push origin main

  # ==========================================
  # JOB 4: NOTIFICACIÓN DE TELEGRAM
  # ==========================================
  notify-telegram:
    name: Notificación a Telegram
    needs: [promote-to-test, run-tests, promote-to-main]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensaje de Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📢 *Frontend CI/CD Pipeline* 📢
            Repositorio: ${{ github.repository }}
            
            Resultados:
            - Pruebas y Sonar: ${{ needs.run-tests.result }}
            - A Main: ${{ needs.promote-to-main.result }}
            
            🧪 *Detalles de Pruebas:*
            Total: ${{ needs.run-tests.outputs.run }} | Éxitos: ${{ needs.run-tests.outputs.success }} | Fallos: ${{ needs.run-tests.outputs.fail }}
            ${{ needs.run-tests.outputs.test_details }}
            
            🛡️ *Calidad SonarCloud:*
            - Bugs: ${{ needs.run-tests.outputs.bugs }}
            - Vulnerabilidades: ${{ needs.run-tests.outputs.vulns }}
            - Code Smells: ${{ needs.run-tests.outputs.smells }}
            
            🔍 [Ver Análisis SonarCloud](https://sonarcloud.io/dashboard?id=ferreteria-kanos_frontend)
            🔗 [Ver Detalles Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
